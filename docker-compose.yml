version: '3.8'

services:
  backend:
    build: .
    container_name: translation_startup
    ports:
      - "8000"
    networks:
      - internal
      - default
    volumes:
      # Прокидаємо локальну папку src у внутрішню папку /app
      - ./src:/app
      # База даних залишається окремо
      - ./data:/app/data
      # Захист venv
      - /app/venv/
    env_file:
      - .env
    restart: unless-stopped
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: 
      - backend
  gradio:
    image: ghcr.io/alertua/patriotyk_styletts2_ukrainian_docker:latest
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_PORT=7860
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 3000s
  styletts2-api:
    image: ghcr.io/alertua/styletts2-ukrainian-openai-tts-api:latest
    environment:
      - GRADIO_URL=http://gradio:7860
      - AUTO_USE_VERBALIZER=1
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - internal
    depends_on:
      gradio:
        condition: service_healthy 

networks:
  internal:
    driver: bridge